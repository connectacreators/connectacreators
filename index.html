<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Preload Playfair Display (landing hero serif) latin normal + italic so the hero paints in the
         right font on first load, with no Georgia/fallback flash. If Google bumps the font version the
         preloads simply no-op and the stylesheet below still loads the font. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/playfairdisplay/v40/nuFiD-vYSZviVYUb_rj3ij__anPXDTzYgEM86xQ.woff2">
    <link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/playfairdisplay/v40/nuFkD-vYSZviVYUb_rj3ij__anPXDTnogkk7yRZrPA.woff2">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Playfair Display (landing hero serif) loaded separately with display=block: the hero stays
         blank for a beat rather than flashing the Georgia fallback, then paints straight into Playfair.
         Paired with the preloads above, that blank beat is imperceptible. -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=block" rel="stylesheet">
    <title>Connecta | Organic Social Media Growth Partner</title>
    <meta name="description" content="Your organic social media growth partner. We help you grow your brand and get clients with organic content." />
    <meta name="keywords" content="organic social media growth, social media growth partner, personal brand, content creators, Instagram growth, short form video" />
    <meta name="author" content="Connecta Creators" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:site_name" content="Connecta Creators" />
    <meta property="og:title" content="Connecta | Organic Social Media Growth Partner" />
    <meta property="og:description" content="Your organic social media growth partner. We help you grow your brand and get clients with organic content." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://connectacreators.com" />
    <meta property="og:image" content="https://connectacreators.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Connecta | Organic Social Media Growth Partner" />
    <meta name="twitter:description" content="Your organic social media growth partner. We help you grow your brand and get clients with organic content." />
    <meta name="twitter:image" content="https://connectacreators.com/og-image.png" />
    <meta name="twitter:creator" content="@ConnectaCreators" />
  </head>
