name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to VPS
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          cd dist
          tar czf /home/runner/deploy.tar.gz assets/ index.html landing.html
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no /home/runner/deploy.tar.gz root@72.62.200.145:/root/deploy.tar.gz
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no root@72.62.200.145 \
            "cd /var/www/connectacreators && tar xzf /root/deploy.tar.gz && rm /root/deploy.tar.gz"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/ba43e8ef9bfec0c8169170a87bde8d68/purge_cache" \
            -H "X-Auth-Email: robertogaunaj@gmail.com" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
