    <!-- Mane lines -->
    <path d="M130 45 C135 55, 138 65, 140 78" stroke="#1a1a2e" stroke-width="3" fill="none" opacity="0.3"/>
    <path d="M125 50 C130 62, 133 72, 135 85" stroke="#1a1a2e" stroke-width="2.5" fill="none" opacity="0.25"/>
    <path d="M120 55 C125 68, 128 78, 130 92" stroke="#1a1a2e" stroke-width="2" fill="none" opacity="0.2"/>
    <!-- Base/pedestal -->
    <rect x="50" y="278" width="130" height="12" rx="6" fill="#e8e8f0"/>
    <rect x="42" y="290" width="146" height="14" rx="7" fill="#e8e8f0"/>
  </g>
