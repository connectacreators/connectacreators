<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="knightGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Base circle -->
  <circle cx="100" cy="100" r="90" fill="url(#knightGradLight)" />
  <circle cx="100" cy="100" r="90" fill="url(#shineLight)" />
  <circle cx="100" cy="100" r="90" fill="none" stroke="#2a2a4a" stroke-width="2" opacity="0.3"/>
  <!-- Chess Knight - dark logo for light backgrounds -->
  <g transform="translate(52, 30) scale(0.55)" fill="#e8e8f0">
    <!-- Head and neck -->
    <path d="M140 40 C130 25, 105 15, 85 20 C65 25, 50 45, 45 65 L40 80 C38 88, 42 92, 48 90 L55 86 C50 100, 48 115, 50 130 C42 135, 35 140, 35 150 L35 160 C35 170, 38 175, 45 178 L50 180 C55 190, 60 200, 65 210 L60 220 C58 228, 55 235, 55 245 L55 260 C55 268, 60 275, 70 278 L105 285 C130 290, 150 288, 165 280 L175 275 C182 272, 185 265, 185 258 L185 245 C185 230, 178 218, 168 210 L158 202 C155 195, 152 185, 152 175 L152 160 C152 145, 158 130, 168 120 C178 110, 182 95, 178 80 C175 68, 165 55, 150 45 Z"/>
    <!-- Eye -->
    <circle cx="105" cy="75" r="10" fill="#1a1a2e"/>
    <circle cx="107" cy="73" r="4" fill="#e8e8f0"/>
    <!-- Nostril -->
